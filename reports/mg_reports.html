    }
    .run-name {

    .main {

    <main class="main">

  </div>
  <script>
    const buttons = Array.from(document.querySelectorAll('.nav-item'));
    const frame = document.getElementById('reportFrame');
    function setActive(btn) {
      buttons.forEach(b => b.classList.toggle('active', b === btn));
      const href = btn?.dataset?.href;
      if (href) {
        frame.src = href;
        location.hash = encodeURIComponent(href);
      }
    }
    buttons.forEach(btn => btn.addEventListener('click', () => setActive(btn)));
    const initialHash = location.hash ? decodeURIComponent(location.hash.slice(1)) : '';
    if (initialHash) {
      const match = buttons.find(b => b.dataset.href === initialHash);
      if (match) setActive(match);
    }
  </script>
