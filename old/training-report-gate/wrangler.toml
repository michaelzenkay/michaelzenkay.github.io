name = "training-report-gate"
main = "src/index.js"
compatibility_date = "2026-03-23"
workers_dev = false

# Route 1: direct link from index
[[routes]]
pattern = "michaelzenkay.com/reports/mg_best_report.html"
zone_name = "michaelzenkay.com"

# Route 2: direct best-run report links under /results/<run>/report.html
# Worker only challenges true report pages and lets other /results/* paths pass through.
[[routes]]
pattern = "michaelzenkay.com/results/*"
zone_name = "michaelzenkay.com"

