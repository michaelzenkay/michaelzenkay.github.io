<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ISPY Tumor Segmentation Viewer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111; color: #ddd; font-family: system-ui, sans-serif;
           display: flex; flex-direction: column; height: 100vh; user-select: none; }

    #toolbar {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      padding: 7px 12px; background: #1a1a1a; border-bottom: 1px solid #2e2e2e;
      flex-shrink: 0;
    }

    /* subject nav */
    #nav-wrap { display: flex; align-items: center; gap: 4px; }
    .nav-btn {
      background: #2a2a2a; color: #bbb; border: 1px solid #444;
      padding: 3px 8px; border-radius: 4px; font-size: 13px; cursor: pointer;
      line-height: 1.4;
    }
    .nav-btn:hover { background: #333; }
    #subject-select {
      background: #222; color: #eee; border: 1px solid #444;
      padding: 3px 7px; border-radius: 4px; font-size: 13px; min-width: 100px;
    }
    #subject-idx { font-size: 11px; color: #555; min-width: 48px; text-align: center; }

    .sep { width: 1px; height: 20px; background: #333; margin: 0 2px; }

    /* toggle buttons */
    .toggle-btn {
      background: #2a2a2a; color: #999; border: 1px solid #444;
      padding: 3px 10px; border-radius: 4px; font-size: 12px; cursor: pointer;
    }
    .toggle-btn:hover { background: #333; }
    .toggle-btn.active-rgb  { background: #1a3a1a; color: #8e8; border-color: #3a6a3a; }
    .toggle-btn.active-pred { background: #3a1a10; color: #f96; border-color: #6a3a20; }
    .toggle-btn.active-gt   { background: #10203a; color: #8af; border-color: #204a7a; }

    .lbl { font-size: 11px; color: #555; }

    /* opacity */
    #opacity-wrap { display: flex; align-items: center; gap: 5px; }
    #opacity-slider { width: 80px; accent-color: #888; }

    #status { margin-left: auto; font-size: 11px; color: #555; white-space: nowrap; }

    #canvas-wrap { flex: 1; position: relative; min-height: 0; }
    #gl { width: 100%; height: 100%; display: block; }

    #info-bar {
      padding: 3px 12px; background: #141414; border-top: 1px solid #222;
      font-size: 11px; color: #444; display: flex; gap: 16px; flex-shrink: 0;
    }

    #metrics-bar {
      padding: 6px 14px; background: #161a16; border-top: 1px solid #1e2a1e;
      font-size: 12px; color: #aaa; display: flex; gap: 28px; flex-shrink: 0;
      flex-wrap: wrap; align-items: baseline;
    }
    #metrics-bar .m-label { color: #555; font-size: 11px; margin-right: 4px; }
    #metrics-bar .m-pred  { color: #f96; }
    #metrics-bar .m-gt    { color: #8af; }
    #metrics-bar .m-group { display: flex; flex-direction: column; gap: 2px; }
    #metrics-bar .m-title { font-size: 10px; color: #444; text-transform: uppercase;
                            letter-spacing: 0.05em; }
  </style>
</head>
<body>

<div id="toolbar">
  <!-- subject navigation -->
  <div id="nav-wrap">
    <button class="nav-btn" id="btn-prev">&#8592;</button>
    <select id="subject-select"><option>Loading...</option></select>
    <button class="nav-btn" id="btn-next">&#8594;</button>
    <span id="subject-idx">--/--</span>
  </div>

  <div class="sep"></div>

  <!-- base image -->
  <span class="lbl">base</span>
  <button class="toggle-btn active-rgb" id="btn-rgb">RGB dynamics</button>

  <div class="sep"></div>

  <!-- overlays -->
  <span class="lbl">overlay</span>
  <button class="toggle-btn active-pred" id="btn-pred">Prediction</button>
  <button class="toggle-btn" id="btn-gt">Ground truth</button>

  <div id="opacity-wrap">
    <span class="lbl">opacity</span>
    <input type="range" id="opacity-slider" min="0" max="1" step="0.05" value="0.45" />
  </div>

  <span id="status">Loading...</span>
</div>

<div id="canvas-wrap">
  <canvas id="gl"></canvas>
</div>

<div id="metrics-bar">
  <div class="m-group">
    <span class="m-title">Longest diameter</span>
    <span><span class="m-label">pred</span><span class="m-pred" id="m-ld-pred">--</span>
          &nbsp;<span class="m-label">gt</span><span class="m-gt" id="m-ld-gt">--</span></span>
  </div>
  <div class="m-group">
    <span class="m-title">d2 (perp.)</span>
    <span><span class="m-label">pred</span><span class="m-pred" id="m-d2-pred">--</span>
          &nbsp;<span class="m-label">gt</span><span class="m-gt" id="m-d2-gt">--</span></span>
  </div>
  <div class="m-group">
    <span class="m-title">d3 (short)</span>
    <span><span class="m-label">pred</span><span class="m-pred" id="m-d3-pred">--</span>
          &nbsp;<span class="m-label">gt</span><span class="m-gt" id="m-d3-gt">--</span></span>
  </div>
  <div class="m-group">
    <span class="m-title">Volume</span>
    <span><span class="m-label">pred</span><span class="m-pred" id="m-vol-pred">--</span>
          &nbsp;<span class="m-label">gt</span><span class="m-gt" id="m-vol-gt">--</span></span>
  </div>
  <div class="m-group">
    <span class="m-title">Sphericity</span>
    <span><span class="m-label">pred</span><span class="m-pred" id="m-sph-pred">--</span>
          &nbsp;<span class="m-label">gt</span><span class="m-gt" id="m-sph-gt">--</span></span>
  </div>
</div>
<div id="info-bar">
  <span id="info-subject">--</span>
  <span id="info-dims">--</span>
  <span id="info-overlay">--</span>
  <span style="margin-left:auto">scroll = slice &nbsp;|&nbsp; &larr;&rarr; = subject</span>
</div>

<script type="module">
import { Niivue, NVImage } from "https://cdn.jsdelivr.net/npm/@niivue/niivue@0.50.0/+esm";

// ------------------------------------------------------------------ config --
const MANIFEST_URL = (new URLSearchParams(location.search)).get("manifest")
  ?? "./manifest.json";

const COLORMAP_PRED = "warm";   // orange-red
const COLORMAP_GT   = "blue";   // blue

// ------------------------------------------------------------------ state ---
let nv = null;
let manifest = null;
let subjects = [];
let currentIdx = 0;
let showRgb  = true;
let showPred = true;
let showGt   = false;
let loading  = false;

// ------------------------------------------------------------------ init ----
async function init() {
  nv = new Niivue({
    backColor: [0.07, 0.07, 0.07, 1],
    show3Dcrosshair: true,
    isColorbar: false,
  });
  await nv.attachTo("gl");
  nv.setSliceType(nv.sliceTypeMultiplanar);

  manifest = await fetchManifest();
  if (!manifest) return;

  subjects = manifest.subjects;
  populateSelect();
  await loadSubject(0);
}

// ------------------------------------------------------------------ manifest --
async function fetchManifest() {
  setStatus("Fetching manifest...");
  try {
    const r = await fetch(MANIFEST_URL);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    setStatus(`${data.subjects.length} subjects`);
    return data;
  } catch (e) {
    setStatus(`Error: ${e.message}`);
    return null;
  }
}

// ------------------------------------------------------------------ subject --
function populateSelect() {
  const sel = document.getElementById("subject-select");
  sel.innerHTML = "";
  for (const s of subjects) {
    const opt = document.createElement("option");
    opt.value = s.id;
    opt.textContent = s.id;
    sel.appendChild(opt);
  }
  sel.addEventListener("change", () => {
    const idx = subjects.findIndex(x => x.id === sel.value);
    if (idx >= 0) loadSubject(idx);
  });
}

function updateNav() {
  document.getElementById("subject-select").value = subjects[currentIdx].id;
  document.getElementById("subject-idx").textContent =
    `${currentIdx + 1}/${subjects.length}`;
}

async function loadSubject(idx) {
  if (loading) return;
  loading = true;
  currentIdx = idx;
  const subject = subjects[idx];
  updateNav();
  setStatus(`Loading ${subject.id}...`);
  document.getElementById("info-subject").textContent = `Subject: ${subject.id}`;

  const base = MANIFEST_URL.replace(/\/[^/]+$/, "/");
  const baseFile = (showRgb && subject.rgb) ? subject.rgb : subject.image;
  const overlayFile = showGt ? subject.gt : (showPred ? subject.pred_binary : null);
  const overlayMap  = showGt ? COLORMAP_GT : COLORMAP_PRED;

  const volumes = [{ url: base + baseFile, colormap: "gray", opacity: 1.0 }];
  if (overlayFile) {
    volumes.push({
      url: base + overlayFile,
      colormap: overlayMap,
      opacity: parseFloat(document.getElementById("opacity-slider").value),
    });
  }

  try {
    await nv.loadVolumes(volumes);
    const hdr = nv.volumes[0]?.hdr;
    if (hdr) {
      document.getElementById("info-dims").textContent =
        `${hdr.dims[1]} x ${hdr.dims[2]} x ${hdr.dims[3]} vox`;
    }
    updateOverlayInfo();
    updateMetrics(subject);
    setStatus(`${subject.id}  (${idx + 1}/${subjects.length})`);
  } catch (e) {
    setStatus(`Load error: ${e.message}`);
    console.error(e);
  }
  loading = false;
}

async function stepSubject(delta) {
  const next = (currentIdx + delta + subjects.length) % subjects.length;
  await loadSubject(next);
}

// ------------------------------------------------------------------ overlay --
async function refreshBase() {
  if (!subjects.length) return;
  await loadSubject(currentIdx);
}

async function refreshOverlay() {
  if (!subjects.length || loading) return;
  while (nv.volumes.length > 1) nv.removeVolume(nv.volumes[1]);

  const subject = subjects[currentIdx];
  const base = MANIFEST_URL.replace(/\/[^/]+$/, "/");
  const overlayFile = showGt ? subject.gt : (showPred ? subject.pred_binary : null);
  const overlayMap  = showGt ? COLORMAP_GT : COLORMAP_PRED;

  if (overlayFile) {
    const img = await NVImage.loadFromUrl({
      url: base + overlayFile,
      colormap: overlayMap,
      opacity: parseFloat(document.getElementById("opacity-slider").value),
    });
    nv.addVolume(img);
  }
  updateOverlayInfo();
}

function updateOverlayInfo() {
  const base    = showRgb ? "RGB" : "grayscale";
  const overlay = showGt ? "GT (blue)" : showPred ? "Pred (orange)" : "none";
  document.getElementById("info-overlay").textContent =
    `Base: ${base}  |  Overlay: ${overlay}`;
}

function syncButtons() {
  document.getElementById("btn-rgb").className =
    "toggle-btn" + (showRgb  ? " active-rgb"  : "");
  document.getElementById("btn-pred").className =
    "toggle-btn" + (showPred ? " active-pred" : "");
  document.getElementById("btn-gt").className =
    "toggle-btn" + (showGt   ? " active-gt"   : "");
}

// ------------------------------------------------------------------ controls --
document.getElementById("btn-prev").addEventListener("click", () => stepSubject(-1));
document.getElementById("btn-next").addEventListener("click", () => stepSubject(+1));

document.getElementById("btn-rgb").addEventListener("click", () => {
  showRgb = !showRgb;
  syncButtons();
  refreshBase();
});

document.getElementById("btn-pred").addEventListener("click", () => {
  showPred = !showPred;
  if (showPred) showGt = false;
  syncButtons();
  refreshOverlay();
});

document.getElementById("btn-gt").addEventListener("click", () => {
  showGt = !showGt;
  if (showGt) showPred = false;
  syncButtons();
  refreshOverlay();
});

document.getElementById("opacity-slider").addEventListener("input", () => {
  if (nv.volumes.length > 1)
    nv.setOpacity(1, parseFloat(document.getElementById("opacity-slider").value));
});

// keyboard: left/right = prev/next subject
document.addEventListener("keydown", e => {
  if (e.target.tagName === "SELECT" || e.target.tagName === "INPUT") return;
  if (e.key === "ArrowLeft")  stepSubject(-1);
  if (e.key === "ArrowRight") stepSubject(+1);
});

function setStatus(msg) {
  document.getElementById("status").textContent = msg;
}

function updateMetrics(subject) {
  const fmt_mm  = v => v != null ? v.toFixed(1) + " mm" : "--";
  const fmt_cc  = v => v != null ? (v / 1000).toFixed(2) + " cm³" : "--";
  const fmt_sph = v => v != null ? v.toFixed(3) : "--";

  const p = subject.metrics_pred ?? {};
  const g = subject.metrics_gt   ?? {};

  document.getElementById("m-ld-pred").textContent  = fmt_mm(p.d1_mm);
  document.getElementById("m-ld-gt").textContent    = fmt_mm(g.d1_mm);
  document.getElementById("m-d2-pred").textContent  = fmt_mm(p.d2_mm);
  document.getElementById("m-d2-gt").textContent    = fmt_mm(g.d2_mm);
  document.getElementById("m-d3-pred").textContent  = fmt_mm(p.d3_mm);
  document.getElementById("m-d3-gt").textContent    = fmt_mm(g.d3_mm);
  document.getElementById("m-vol-pred").textContent = fmt_cc(p.volume_mm3);
  document.getElementById("m-vol-gt").textContent   = fmt_cc(g.volume_mm3);
  document.getElementById("m-sph-pred").textContent = fmt_sph(p.sphericity);
  document.getElementById("m-sph-gt").textContent   = fmt_sph(g.sphericity);
}

// ------------------------------------------------------------------ go ------
init();
</script>
</body>
</html>
